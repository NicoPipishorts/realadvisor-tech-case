name: realadvisor-tech-case

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: realadvisor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d realadvisor"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - realadvisor_pg_data:/var/lib/postgresql/data

volumes:
  realadvisor_pg_data:
